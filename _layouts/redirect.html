<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  {% if page.destination %}
  <link rel="canonical" href="{{ page.destination | absolute_url }}">
  <script type="text/javascript">
    window.location.href = "{{ page.destination | relative_url }}";
  </script>
  <meta http-equiv="refresh" content="0;url={{ page.destination | relative_url }}">
  {% endif %}
</head>
<body>
  <h1>Redirecting...</h1>
  {% if page.destination %}
  <a href="{{ page.destination | relative_url }}">Click here if you are not redirected.</a>
  {% else %}
  <p>No destination specified.</p>
  {% endif %}
</body>
</html>
